name: Security Scan

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run pip audit (backend)
        # Note: starlette CVE-2025-54121 and CVE-2025-62727 require FastAPI major upgrade.
        # Starlette is a transitive dependency of FastAPI 0.115.x (requires starlette<0.42.0).
        # Upgrade to FastAPI 0.120.x+ is tracked in GitHub Issue for a future sprint.
        run: |
          cd backend
          pip-audit -r requirements.txt \
            --ignore-vuln CVE-2025-54121 \
            --ignore-vuln CVE-2025-62727

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run npm audit (frontend)
        # Note: Next.js High-severity DoS vulnerabilities (GHSA-9g9p-9gw9-jx7f,
        # GHSA-h25m-26qc-wcjf, GHSA-ggv3-7p47-pfv8, GHSA-3x4c-7xq6-9pq8) require
        # Next.js 16 upgrade (breaking change). Tracked in GitHub Issue for future sprint.
        # Critical vulnerability GHSA-f82v-jwr5-mffw (Authorization Bypass) fixed in 14.2.35.
        run: |
          cd frontend
          npm audit --audit-level=critical

  container-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build backend image for scanning
        run: docker build -t bcp-backend:scan ./backend

      - name: Trivy scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: bcp-backend:scan
          format: table
          severity: "CRITICAL,HIGH"
        continue-on-error: true

      - name: Build frontend image for scanning
        run: docker build -t bcp-frontend:scan ./frontend

      - name: Trivy scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: bcp-frontend:scan
          format: table
          severity: "CRITICAL,HIGH"
        continue-on-error: true
