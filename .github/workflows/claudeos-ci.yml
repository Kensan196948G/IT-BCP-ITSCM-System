name: ClaudeOS CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install Frontend Dependencies
      working-directory: frontend
      run: npm ci

    - name: Frontend Lint
      working-directory: frontend
      run: npm run lint

    - name: Install Backend Dependencies
      working-directory: backend
      run: pip install -r requirements.txt

    - name: Backend Lint (flake8)
      working-directory: backend
      run: flake8 . --max-line-length=120

    - name: Backend Format Check (black)
      working-directory: backend
      run: black --check .

    - name: Backend Type Check (mypy)
      working-directory: backend
      run: mypy . --show-error-codes --no-error-summary

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
    - uses: actions/checkout@v6

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install Backend Dependencies
      working-directory: backend
      run: pip install -r requirements.txt

    - name: Backend Tests with Coverage
      working-directory: backend
      run: pytest --tb=short -q --cov=. --cov-report=term-missing --cov-fail-under=80

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Frontend Dependencies
      working-directory: frontend
      run: npm ci

    - name: Frontend Tests
      working-directory: frontend
      run: npm test

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v6

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install pip-audit
      run: pip install pip-audit

    - name: Install Backend Dependencies
      working-directory: backend
      run: pip install -r requirements.txt

    - name: Run pip-audit (project deps only)
      # Note: starlette CVE-2025-54121 and CVE-2025-62727 require FastAPI major upgrade.
      # Starlette is a transitive dependency of FastAPI 0.115.x (requires starlette<0.42.0).
      # Upgrade to FastAPI 0.120.x+ is tracked in GitHub Issue for a future sprint.
      working-directory: backend
      run: |
        pip-audit -r requirements.txt \
          --ignore-vuln CVE-2025-54121 \
          --ignore-vuln CVE-2025-62727

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Frontend Dependencies
      working-directory: frontend
      run: npm ci

    - name: Run npm audit (frontend)
      # Note: Next.js High-severity DoS vulnerabilities require Next.js 16 upgrade (breaking change).
      # Only block on critical severity to avoid false positives from known upgrade-blocked vulns.
      working-directory: frontend
      run: npm audit --audit-level=critical

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
    - uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Frontend Dependencies
      working-directory: frontend
      run: npm ci

    - name: Build Frontend
      working-directory: frontend
      run: npm run build
