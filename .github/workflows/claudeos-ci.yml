name: ClaudeOS CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Frontend Dependencies
      working-directory: frontend
      run: npm ci

    - name: Frontend Lint
      working-directory: frontend
      run: npm run lint

    - name: Install Backend Dependencies
      working-directory: backend
      run: |
        pip install -r requirements.txt
        pip install flake8 black isort mypy

    - name: Backend Lint (flake8)
      working-directory: backend
      run: flake8 . --max-line-length=120

    - name: Backend Format Check (black)
      working-directory: backend
      run: black --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Backend Dependencies
      working-directory: backend
      run: pip install -r requirements.txt

    - name: Backend Tests
      working-directory: backend
      run: pytest --tb=short -q

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Frontend Dependencies
      working-directory: frontend
      run: npm ci

    - name: Frontend Tests
      working-directory: frontend
      run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Frontend Dependencies
      working-directory: frontend
      run: npm ci

    - name: Build Frontend
      working-directory: frontend
      run: npm run build
