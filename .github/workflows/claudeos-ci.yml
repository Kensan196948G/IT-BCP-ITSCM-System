name: ClaudeOS CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Frontend Dependencies
      working-directory: frontend
      run: npm ci
      continue-on-error: true

    - name: Frontend Lint
      working-directory: frontend
      run: npm run lint
      continue-on-error: true

    - name: Install Backend Dependencies
      working-directory: backend
      run: |
        pip install -r requirements.txt
        pip install flake8 black isort mypy
      continue-on-error: true

    - name: Backend Lint (flake8)
      working-directory: backend
      run: flake8 . --max-line-length=120
      continue-on-error: true

    - name: Backend Format Check (black)
      working-directory: backend
      run: black --check .
      continue-on-error: true

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bcp_test
          POSTGRES_PASSWORD: bcp_test_pass
          POSTGRES_DB: bcp_itscm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Backend Dependencies
      working-directory: backend
      run: pip install -r requirements.txt
      continue-on-error: true

    - name: Backend Tests
      working-directory: backend
      run: pytest --tb=short -q
      env:
        DATABASE_URL: postgresql://bcp_test:bcp_test_pass@localhost:5432/bcp_itscm_test
        REDIS_URL: redis://localhost:6379/0
      continue-on-error: true

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Frontend Dependencies
      working-directory: frontend
      run: npm ci
      continue-on-error: true

    - name: Frontend Tests
      working-directory: frontend
      run: npm test
      continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Frontend Dependencies
      working-directory: frontend
      run: npm ci
      continue-on-error: true

    - name: Build Frontend
      working-directory: frontend
      run: npm run build
      continue-on-error: true
