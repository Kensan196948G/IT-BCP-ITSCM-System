[tool.black]
line-length = 120
target-version = ["py312"]

[tool.isort]
profile = "black"
line_length = 120

[tool.mypy]
python_version = "3.12"
strict = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
filterwarnings = [
    # python-jose uses datetime.utcnow() internally; suppress until upstream fixes
    "ignore::DeprecationWarning:jose",
]
markers = [
    "e2e: marks tests as end-to-end (require live server, excluded from unit CI)",
]
addopts = "-m 'not e2e'"
